# SonarQube Configuration for Content Editorial Assistant
# Corporate SAST Solution: https://sonarqube.corp.redhat.com

# Project identification
sonar.projectKey=ccs-ai_content-editorial-assistant_ed819014-2450-4f3a-baea-571408e42aaa
sonar.projectName=Content Editorial Assistant
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=app,rules,style_guides
sonar.sourceEncoding=UTF-8

# Exclusions (non-source files)
sonar.exclusions=\
  **/venv/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/.cache/**,\
  **/*.pyc,\
  **/static/**,\
  **/templates/**,\
  **/scripts/**,\
  **/.light/**

# Test configuration
sonar.tests=tests
sonar.test.inclusions=**/test_*.py

# Python-specific configuration
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.bandit.reportPaths=security_reports/bandit_report.json

# Quality gate
sonar.qualitygate.wait=false
