# Spelling Allowlist — Technical terms not in standard English dictionaries
#
# LanguageTool's MORFOLOGIK_RULE_EN_US dictionary spellchecker flags these
# terms as misspellings.  Rather than blanket-disabling MORFOLOGIK (which
# would miss genuine typos like "aplication"), CEA checks flagged words
# against this allowlist and drops matches on recognized domain terms.
#
# Guidelines for adding entries:
#   - Lowercase only (the lookup lowercases the flagged text before checking)
#   - Single words only (multi-word phrases won't be flagged as one MORFOLOGIK match)
#   - Do NOT add words that are in standard English dictionaries
#   - Include plural/variant forms explicitly (e.g., "configmap" AND "configmaps")
#   - Alphabetical order within each section for easy maintenance
#
# Sources:
#   - Red Hat Supplementary Style Guide product name list
#   - case_sensitive_terms_config.yaml (590 entries)
#   - Red Hat / OpenShift / Kubernetes official documentation glossaries
#   - LanguageTool false positive observations from CEA testing

