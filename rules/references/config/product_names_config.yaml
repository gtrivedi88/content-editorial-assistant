# Product and Service Names Configuration
# IBM Style Guide (p. 228-232)

# Common product name misspellings -> correct form (p. 229)
# "Do not change the form or representation of the product name,
#  including its capitalization or punctuation."
product_misspellings:
  "Websphere": "WebSphere"
  "websphere": "WebSphere"
  "WEBSPHERE": "WebSphere"
  "Qradar": "QRadar"
  "qradar": "QRadar"
  "QRADAR": "QRadar"
  "Db2": "Db2"
  "DB2": "Db2"
  "db2": "Db2"
  "Watsonx": "watsonx"
  "WatsonX": "watsonx"
  "WATSONX": "watsonx"
  "Openshift": "OpenShift"
  "openshift": "OpenShift"
  "OPENSHIFT": "OpenShift"
  "RedHat": "Red Hat"
  "Redhat": "Red Hat"
  "redhat": "Red Hat"
  "REDHAT": "Red Hat"
  "Github": "GitHub"
  "github": "GitHub"
  "GITHUB": "GitHub"
  "Gitlab": "GitLab"
  "gitlab": "GitLab"
  "GITLAB": "GitLab"
  "Linkedin": "LinkedIn"
  "linkedin": "LinkedIn"
  "LINKEDIN": "LinkedIn"
  "Kubernetes": "Kubernetes"
  "kubernetes": "Kubernetes"
  "Cloudpak": "Cloud Pak"
  "CloudPak": "Cloud Pak"
  "cloudpak": "Cloud Pak"
  "Powerai": "PowerAI"
  "powerai": "PowerAI"
  "Datapower": "DataPower"
  "datapower": "DataPower"

# IBM product abbreviations that should not be used (p. 230)
# "Do not abbreviate IBM to I in any product names."
# "Do not abbreviate product, brand, or service names."
prohibited_abbreviations:
  "IRAM": "IBM Rational Asset Manager"
  "IEM": "IBM Endpoint Manager"
  "CP4D": "Cloud Pak for Data"
  "IWS": "IBM Workload Scheduler"
  "CP4I": "Cloud Pak for Integration"
  "CP4S": "Cloud Pak for Security"
  "CP4BA": "Cloud Pak for Business Automation"

# Known IBM products that need correct capitalization
ibm_products:
  - "Watson"
  - "watsonx"
  - "WebSphere"
  - "Db2"
  - "QRadar"
  - "Cognos"
  - "SPSS"
