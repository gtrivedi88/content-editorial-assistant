# Numerals vs Words Rule Configuration
# IBM Style Guide (p.157): "Always use words for the first number
# if it occurs at the beginning of a sentence."

# Numeral-to-word mapping for suggestions
numeral_words:
  "0": "Zero"
  "1": "One"
  "2": "Two"
  "3": "Three"
  "4": "Four"
  "5": "Five"
  "6": "Six"
  "7": "Seven"
  "8": "Eight"
  "9": "Nine"
  "10": "Ten"
  "11": "Eleven"
  "12": "Twelve"
  "13": "Thirteen"
  "14": "Fourteen"
  "15": "Fifteen"
  "16": "Sixteen"
  "17": "Seventeen"
  "18": "Eighteen"
  "19": "Nineteen"
  "20": "Twenty"
  "30": "Thirty"
  "40": "Forty"
  "50": "Fifty"
  "60": "Sixty"
  "70": "Seventy"
  "80": "Eighty"
  "90": "Ninety"
  "100": "One hundred"
  "1000": "One thousand"

# Block types to skip entirely (technical content and list items —
# numbered list items are expected to start with numerals)
skip_block_types:
  - listing
  - literal
  - code_block
  - inline_code
  - list_item_ordered
  - list_item_unordered
  - list_item

# Patterns at sentence start that indicate numbered list items (skip these).
# Includes standalone "N." from SpaCy sentence splits of "1. Select..."
list_item_patterns:
  - '^\d+\.\s'
  - '^\d+\)\s'
  - '^\d+\.$'
