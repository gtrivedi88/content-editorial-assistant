# Articles Rule Configuration
# IBM Style Guide (Page 91): Use 'a' before consonant sounds, 'an' before vowel sounds.
#
# HOW TO MAINTAIN:
# - Add new abbreviations to the appropriate section when discovered
# - The rule checks this file at startup — no code changes needed
# - If unsure about pronunciation, test: say the abbreviation aloud.
#   Does it start with a vowel sound? Add to vowel_sound_abbreviations.

# Abbreviations that START with a vowel SOUND (use "an")
# These start with vowel sounds when spoken: "ess", "aitch", "eff", "em", "en", "ar", "ex"
vowel_sound_abbreviations:
  # S- abbreviations ("ess-...")
  - sql
  - sla
  - sdk
  - sdn
  - sku
