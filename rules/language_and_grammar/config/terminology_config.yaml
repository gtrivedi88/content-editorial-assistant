# Terminology Rule Configuration
# IBM Style Guide (Page 113): Use consistent, standardized terms.
#
# HOW TO MAINTAIN:
# - Add new deprecated → preferred term pairs below
# - No code changes needed — just edit this file and restart.

# Deprecated terms mapped to preferred replacements
term_map:
