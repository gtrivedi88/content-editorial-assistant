# Complex entries with regex patterns (negative lookbehind etc.)
# These are stored separately and use re.search() instead of simple word boundary.
# Format: pattern -> replacement
# Each pattern is a Python regex. Matching is case-sensitive.
regex_terms:
  # javadocs? but not preceded by .-
  '(?<!\.-)javadocs?': "Javadoc"

  # var but not preceded by /
  '(?<!/)var': "VAR"

  # Resource Planner but not preceded by "Business "
  '(?<!Business )Resource Planner': "Business Resource Planner"

  # Planner but not preceded by "Business Resource "
  '(?<!Business Resource )Planner': "Business Resource Planner"

  # On-Demand Marketplace but not preceded by "Microsoft Azure "
  '(?<!Microsoft Azure )On-Demand Marketplace': "Microsoft Azure On-Demand Marketplace"

  # Advanced Cluster Management (without Red Hat prefix)
  '(?<!Red Hat )Advanced Cluster Management for Kubernetes': "Red Hat Advanced Cluster Management for Kubernetes"
  '(?<!Red Hat )Advanced Cluster Management(?! for)': "Red Hat Advanced Cluster Management for Kubernetes"

  # JBoss Enterprise Application Platform (without Red Hat prefix)
  '(?<!Red Hat )JBoss Enterprise Application Platform': "Red Hat JBoss Enterprise Application Platform"

  # OpenStack Platform (without Red Hat prefix)
  '(?<!Red Hat )OpenStack Platform': "Red Hat OpenStack Platform"

  # BRMS (not preceded by "Red Hat JBoss " and not followed by " engine")
  '(?<!Red Hat JBoss )BRMS(?! engine)': "inference engine"

  # BRMS / JBoss BRMS (without Red Hat prefix)
  '(?<!Red Hat )JBoss BRMS': "Red Hat JBoss BRMS"

  # BC (not preceded by "T-")
  '(?<!T-)BC': "Business Central"

  # Day-0/day 0 patterns
  '[dD]ay-0': "Day 0"
  'day 0': "Day 0"
  '[dD]ay-1': "Day 1"
  'day 1': "Day 1"
  '[dD]ay-2': "Day 2"
  'day 2': "Day 2"

  # BPMS / JBoss BPMS / BPM (without Red Hat prefix)
  'BPMS': "Red Hat JBoss BPM Suite"
  '(?<!Red Hat )JBoss BPMS': "Red Hat JBoss BPM Suite"
  '(?<!Red Hat JBoss )BPM(?! Suite)': "Red Hat JBoss BPM Suite"

  # DM (not followed by -multipath or -Multipath)
  'DM(?![ -]?[Mm]ultipath)': "Directory Manager"
  'directory manager': "Directory Manager"

  # Kernel (not followed by specific terms)
  'Kernel(?!-based Virtual Machine| Module Management| parameters| arguments| packet filtering)': "kernel"

  # OCM / OpenShift Cluster Manager (without Red Hat prefix)
  'OCM': "Red Hat OpenShift Cluster Manager"
  '(?<!Red Hat OpenShift )Cluster Manager': "Red Hat OpenShift Cluster Manager"
  '(?<!Red Hat )OpenShift Cluster Manager': "Red Hat OpenShift Cluster Manager"
  'the OpenShift Cluster Manager': "Red Hat OpenShift Cluster Manager"

  # sub version / Subversion (without Apache prefix)
  '(?<!Apache )Subversion': "sub-version"
  'sub version': "sub-version"

  # IM (not preceded by .)
  '(?<!\.)IM': "instant message"

  # yaml (not preceded by . and not followed by -patch)
  '(?<!\.)yaml(?!-patch)': "YAML"
  'Yaml': "YAML"

  # JBoss EAP / JBoss (complex negative lookbehinds)
  '(?<!JBoss )EAP': "JBoss EAP"
  '(?<!Red Hat )JBoss(?!\sCommunity|\sBroker|\sClients|\sConsole|\sAMQ|\sData\sGrid|\sBRMS|\sBPMS|\sEnterprise\sApplication\sPlatform|\.org|\sInterconnect|\sEAP|\sBPM\sSuite)': "JBoss EAP"

  # Realtime Decision Server
  '(?<!Realtime )Decision\sServer': "Realtime Decision Server"

  # Node.js variants
  '[nN]odejs': "Node.js"
  '[nN]ode\.JS': "Node.js"
  'node\.js': "Node.js"

  # NVIDIA variants
  '\b(NVidia|N-Vidia|Nvidia|nVIDIA)\b': "NVIDIA"
  '\bnvidia(?!/)\b': "NVIDIA"

  # ACK (not followed by " flag")
  'ACK(?!\sflag)': "ACK flag"

  # ActiveMQ (not followed by " Artemis")
  'ActiveMQ(?!\sArtemis)': "built-in messaging"

  # Kie (not followed by " Server")
  'Kie(?!\sServer)': "KIE"

  # Kie Server
  'Kie\sServer': "Intelligent Process Server"

  # RESTEASY / resteasy (not preceded by -)
  'RESTEASY': "RESTEasy"
  '(?<!-)resteasy': "RESTEasy"
  'Resteasy': "RESTEasy"

  # self-hosted engine virtual machine / engine VM
  'self-hosted\sengine\svirtual\smachine': "Manager virtual machine"
  'engine\sVM': "Manager virtual machine"

  # Kubelet (not followed by " Stats Receiver")
  'Kubelet(?! Stats Receiver)': "kubelet"

  # MS (not followed by -DOS)
  'MS(?!-DOS?|FT)': "Microsoft"

  # VT (not followed by -d or -i)
  'VT(?!-d)': "Intel Virtualization Technology"
  'VT-i': "Intel Virtualization Technology"

  # Playbook (not preceded by "Ansible ")
  '(?<!Ansible )Playbook': "playbook"
