# ── Pattern Terms (need regex lookbehinds) ───────────────────────────
# Used by pattern_terms_rule.py via _match_pattern_terms().
# Each entry has: wrong, right, pattern (regex with lookbehinds).
pattern_terms:
  - wrong: "bootloader"
    right: "boot loader"
    pattern: '(?<!\bGRand Unified )(?<!\bGRUB )\bbootloader\b'
  - wrong: "Firefox"
    right: "Mozilla Firefox"
    pattern: '(?<!\bMozilla )\bFirefox\b'
  - wrong: "Thunderbird"
    right: "Mozilla Thunderbird"
    pattern: '(?<!\bMozilla )\bThunderbird\b'
  - wrong: "hosted engine"
    right: "self-hosted engine"
    pattern: '(?<!self-)\bhosted engine\b'
  - wrong: "hosted-engine"
    right: "self-hosted engine"
    pattern: '(?<!self-)\bhosted-engine\b'
  - wrong: "executable"
    right: "executable program"
    pattern: '\bexecutable\b(?!\s+(?:program|routine|files?|code))'
  - wrong: "transition"
    right: "make the transition, move, migrate, change"
    pattern: '(?<!\bmake the )\btransition\b'
