# Word Usage Rule Configuration
# IBM Style Guide (Pages 284-414): Word Usage A-Z entries.
# Enriched with Red Hat Vale TermsErrors entries.
#
# HOW TO MAINTAIN:
# - Add new wrong → right term pairs under the appropriate letter section
# - Only include entries marked X (Do not use) in the IBM Style Guide
# - Entries already in terminology_config.yaml are NOT duplicated here
# - No code changes needed — just edit this file and restart.
#
# Terms already covered by terminology_rule.py (NOT duplicated here):
#   abort, click on, e-mail, web site, data base, utilize, leverage,
#   execute, terminate, kill, desire, in order to, prior to, etc.
#   See: rules/language_and_grammar/config/terminology_config.yaml

