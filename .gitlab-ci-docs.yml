# ============================================================
# DOCUMENTATION PIPELINE
# ============================================================
#
# Builds Antora documentation and publishes to GitLab Pages.
# Runs only on the default branch (main).
# ============================================================

variables:
  NODE_VERSION: "18"
  DOCS_DIR: "docs"
  NODE_IMAGE: "registry.access.redhat.com/ubi9/nodejs-18:latest"
  ALPINE_IMAGE: "registry.access.redhat.com/ubi9-minimal:latest"

cache:
  key: "docs-cache-$CI_COMMIT_REF_SLUG"
  paths:
    - docs/.npm/

# ============================================================
# DOCUMENTATION JOBS
# ============================================================

build-docs:
  stage: build
  image: ${NODE_IMAGE}
  allow_failure: true
  before_script:
    - cd $DOCS_DIR
    - rm -rf node_modules
    - mkdir -p .npm
    - npm ci --cache .npm --prefer-offline
  script:
    - echo "Building Content Editorial Assistant documentation..."
    - npx antora --fetch antora-playbook.yml
    - echo "Documentation build completed"
    - ls -la dist/
  artifacts:
    expire_in: 1 hour
    paths:
      - docs/dist/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - itup-alm-x86

pages:
  stage: deploy-prod
  image: ${ALPINE_IMAGE}
  dependencies:
    - build-docs
  script:
    - echo "Publishing to GitLab Pages..."
    - rm -rf public
    - mkdir public
    - cp -r docs/dist/* public/
    - echo "Available at $CI_PAGES_URL"
  artifacts:
    expire_in: 30 days
    paths:
      - public
  environment:
    name: docs-production
    url: $CI_PAGES_URL
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - itup-alm-x86
