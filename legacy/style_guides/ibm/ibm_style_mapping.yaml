# IBM Style Guide Rule Mapping
# Single source of truth for all IBM Style Guide references
#
# BASED ON:
# Document: ibm-style-documentation.pdf
#
# PURPOSE:
# 1. Prevent hallucinated page numbers
# 2. Ensure consistency across all rules
# 3. Enable verification tracking
# 4. Support UI display of rule sources
# 5. Link confidence scoring to verification status

version: "2.0"
last_updated: "2026-01-23"
source_documents:
  ibm_style_guide:
    file: "ibm-style-documentation.pdf"
    version: "2025 Edition"
    page_number_type: "print" 
  red_hat_ssg:
    url: "https://redhat-documentation.github.io/supplementary-style-guide/"
    version: "Latest"

# ============================================================================
# AUDIENCE AND MEDIUM
# ============================================================================
audience_and_medium:

  accessibility:
    rule_id: "accessibility"
    display_name: "Accessibility"
    category: "audience_and_medium"
    severity: "high"
    ibm_style:
      topic: "Accessibility"
      pages: [60]
      verification_status: "verified"
      guidance: "Ensure content is perceivable, understandable, operable, and robust."

  ai_assistants:
    rule_id: "ai_assistants"
    display_name: "AI Assistants"
    category: "audience_and_medium"
    severity: "medium"
    ibm_style:
      topic: "AI assistants"
      pages: [61]
      verification_status: "verified"
      guidance: "Follow guidance for writing dialog and prompts for AI assistants."

  conversational_style:
    rule_id: "conversational_style"
    display_name: "Conversational Style"
    category: "audience_and_medium"
    severity: "medium"
    ibm_style:
      topic: "Conversational style"
      pages: [62]
      verification_status: "verified"
      guidance: "Use simple, clear, approachable language appropriate for the content type."

  global_audiences:
    rule_id: "global_audiences"
    display_name: "Global Audiences"
    category: "audience_and_medium"
    severity: "medium"
    ibm_style:
      topic: "Global audiences"
      pages: [63, 64, 65, 66, 67, 68]
      verification_status: "verified"
      guidance: "Avoid slang, jargon, humor, sarcasm, and culture-specific references."

  llms:
    rule_id: "llms"
    display_name: "LLM Consumability"
    category: "audience_and_medium"
    severity: "medium"
    ibm_style:
      topic: "LLMs (Large Language Models)"
      pages: [69, 70]
      verification_status: "verified"
      guidance: "Write content that is consumable by AI models; avoid tiny topics."

  marketing:
    rule_id: "marketing"
    display_name: "Marketing Content"
    category: "audience_and_medium"
    severity: "low"
    ibm_style:
      topic: "Marketing"
      pages: [71, 72, 73]
      verification_status: "verified"
      guidance: "Follow specific exceptions for marketing content regarding tone and punctuation."

  mobile:
    rule_id: "mobile"
    display_name: "Mobile Content"
    category: "audience_and_medium"
    severity: "medium"
    ibm_style:
      topic: "Mobile"
      pages: [74]
      verification_status: "verified"
      guidance: "Use appropriate terminology for actions and gestures on mobile devices."

  red_hat_style:
    rule_id: "red_hat_style"
    display_name: "Red Hat vs IBM Style"
    category: "audience_and_medium"
    severity: "low"
    ibm_style:
      topic: "Red Hat versus IBM conventions for style"
      pages: [75]
      verification_status: "verified"
      guidance: "Note differences in word usage (client vs customer) and admonitions."

  social_media:
    rule_id: "social_media"
    display_name: "Social Media"
    category: "audience_and_medium"
    severity: "low"
    ibm_style:
      topic: "Social media"
      pages: [76]
      verification_status: "verified"
      guidance: "Follow IBM Social Computing Guidelines when endorsing/incorporating social media."

  third_party_tools:
    rule_id: "third_party_tools"
    display_name: "Third-Party Tools"
    category: "audience_and_medium"
    severity: "high"
    ibm_style:
      topic: "Third-party tools"
      pages: [77]
      verification_status: "verified"
      guidance: "Do not use unapproved generative AI tools or tools that expose confidential data."

  tone:
    rule_id: "tone"
    display_name: "Tone"
    category: "audience_and_medium"
    severity: "medium"
    ibm_style:
      topic: "Tone"
      pages: [78, 79, 80, 81]
      verification_status: "verified"
      guidance: "Use a tone appropriate for the subject, goal, and audience (universal and timeless)."

  videos:
    rule_id: "videos"
    display_name: "Videos"
    category: "audience_and_medium"
    severity: "medium"
    ibm_style:
      topic: "Videos"
      pages: [82, 83]
      verification_status: "verified"
      guidance: "Follow guidelines for creating, linking, and embedding videos, including captions."

# ============================================================================
# LANGUAGE AND GRAMMAR
# ============================================================================
language_and_grammar:

  abbreviations:
    rule_id: "abbreviations"
    display_name: "Abbreviations"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Abbreviations"
      pages: [84, 85, 86, 87, 88]
      verification_status: "verified"
      guidance: "Spell out abbreviations at first occurrence unless commonly known."

  adverbs_only:
    rule_id: "adverbs_only"
    display_name: "Adverbs - Only"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Adverbs - only"
      pages: [89]
      verification_status: "verified"
      guidance: "Place 'only' immediately before the word or phrase it modifies."

  anthropomorphism:
    rule_id: "anthropomorphism"
    display_name: "Anthropomorphism"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Anthropomorphism"
      pages: [90]
      verification_status: "verified"
      guidance: "Do not assign human characteristics to inanimate objects."

  articles:
    rule_id: "articles"
    display_name: "Articles"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Articles"
      pages: [91]
      verification_status: "verified"
      guidance: "Use 'a' before consonant sounds and 'an' before vowel sounds."

  capitalization:
    rule_id: "capitalization"
    display_name: "Capitalization"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Capitalization"
      pages: [92, 93, 94, 95, 96]
      verification_status: "verified"
      guidance: "Use sentence-style capitalization for most elements unless noted otherwise."

  conjunctions:
    rule_id: "conjunctions"
    display_name: "Conjunctions"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Conjunctions"
      pages: [101]
      verification_status: "verified"
      guidance: "Use coordinating and subordinating conjunctions correctly to avoid ambiguity."

  contractions:
    rule_id: "contractions"
    display_name: "Contractions"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Contractions"
      pages: [102]
      verification_status: "verified"
      guidance: "Contractions are permitted but must fit the context."

  inclusive_language:
    rule_id: "inclusive_language"
    display_name: "Inclusive Language"
    category: "language_and_grammar"
    severity: "high"
    ibm_style:
      topic: "Inclusive language"
      pages: [103]
      verification_status: "verified"
      guidance: "Avoid bias in terminology; replace non-inclusive terms (e.g., master/slave)."

  plurals:
    rule_id: "plurals"
    display_name: "Plurals"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Plurals"
      pages: [104, 105]
      verification_status: "verified"
      guidance: "Form plurals correctly for abbreviations, letters, and numbers."

  possessives:
    rule_id: "possessives"
    display_name: "Possessives"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Possessives"
      pages: [106]
      verification_status: "verified"
      guidance: "Form possessives correctly; use 'your' for assets customized by the user."

  prefixes:
    rule_id: "prefixes"
    display_name: "Prefixes"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Prefixes"
      pages: [107]
      verification_status: "verified"
      guidance: "Generally, do not hyphenate prefixes unless necessary for clarity."

  prepositions:
    rule_id: "prepositions"
    display_name: "Prepositions"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Prepositions"
      pages: [108]
      verification_status: "verified"
      guidance: "Avoid using too many prepositions; use 'that' clauses to improve flow."

  pronouns:
    rule_id: "pronouns"
    display_name: "Pronouns"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Pronouns"
      pages: [109, 110, 111]
      verification_status: "verified"
      guidance: "Use gender-neutral pronouns; use 'you' for the user; avoid first person."

  spelling:
    rule_id: "spelling"
    display_name: "Spelling"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Spelling"
      pages: [112]
      verification_status: "verified"
      guidance: "Use US English spelling (e.g., color, behavior, center)."

  terminology:
    rule_id: "terminology"
    display_name: "Terminology"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Terminology"
      pages: [113]
      verification_status: "verified"
      guidance: "Use consistent, standardized terms; refer to the IBM Terminology database."

  verbs:
    rule_id: "verbs"
    display_name: "Verbs"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Verbs"
      pages: [113, 114, 115, 116]
      verification_status: "verified"
      guidance: "Use active voice and present tense; ensure subject-verb agreement."

  passive_voice:
    rule_id: "passive_voice"
    display_name: "Passive Voice"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Voice"
      pages: [121]
      verification_status: "verified"
      guidance: "Use active voice as much as possible. Passive voice is acceptable when the system performs the action or to avoid blaming the user."

  verb_tense:
    rule_id: "verb_tense"
    display_name: "Verb Tense"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Tense"
      pages: [120]
      verification_status: "verified"
      guidance: "Write in simple present tense as much as possible. Use past or future tense only when necessary."

  future_tense:
    rule_id: "future_tense"
    display_name: "Future Tense"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Tense"
      pages: [120]
      verification_status: "verified"
      guidance: "Avoid future tense (will, will be). Use present tense instead."

  first_person:
    rule_id: "first_person"
    display_name: "First Person"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Person"
      pages: [119]
      verification_status: "verified"
      guidance: "Avoid first person pronouns (I, me, my, we, us, our). Focus on the reader, not the writer."

  second_person:
    rule_id: "second_person"
    display_name: "Second Person"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Person"
      pages: [119]
      verification_status: "verified"
      guidance: "Use second person (you) to focus on the reader. Use imperative mood for instructions."

  sentence_length:
    rule_id: "sentence_length"
    display_name: "Sentence Length"
    category: "language_and_grammar"
    severity: "medium"
    ibm_style:
      topic: "Global audiences (Grammar) / Paragraphs"
      pages: [66, 206]
      verification_status: "verified"
      guidance: "Keep sentences short and focused. Long sentences can be difficult to understand, especially for global audiences."

  wordiness:
    rule_id: "wordiness"
    display_name: "Wordiness"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Global audiences (Style) / Tone"
      pages: [64, 79]
      verification_status: "verified"
      guidance: "Be succinct. Avoid redundant phrases (e.g., 'at this point in time')."

  nominalization:
    rule_id: "nominalization"
    display_name: "Nominalization / Parts of Speech"
    category: "language_and_grammar"
    severity: "low"
    ibm_style:
      topic: "Global audiences (Grammar)"
      pages: [66]
      verification_status: "verified"
      guidance: "Avoid using verbs as nouns or vice versa. Avoid long noun phrases."

  self_referential_text:
    rule_id: "self_referential_text"
    display_name: "Self-Referential Text"
    category: "structure_and_format"
    severity: "medium"
    ibm_style:
      topic: "Global audiences (Style)"
      pages: [65]
      verification_status: "verified"
      guidance: "Avoid 'This topic describes...'. Focus on the content's purpose or value."



# ============================================================================
# PUNCTUATION
# ============================================================================
punctuation:

  punctuation_symbols:
    rule_id: "punctuation_symbols"
    display_name: "Punctuation and Symbols"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Punctuation and symbols"
      pages: [117, 118, 119, 120]
      verification_status: "verified"
      guidance: "General guidance on symbols and special characters."

  colons:
    rule_id: "colons"
    display_name: "Colons"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Colons"
      pages: [121]
      verification_status: "verified"
      guidance: "Use colons to introduce lists or related info; use lowercase following colon in sentences."

  commas:
    rule_id: "commas"
    display_name: "Commas"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Commas"
      pages: [123]
      verification_status: "verified"
      guidance: "Use serial commas; use commas for nonrestrictive clauses."

  dashes:
    rule_id: "dashes"
    display_name: "Dashes"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Dashes"
      pages: [125]
      verification_status: "verified"
      guidance: "Use en dashes for ranges; avoid em dashes in technical content."

  ellipses:
    rule_id: "ellipses"
    display_name: "Ellipses"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Ellipses"
      pages: [127]
      verification_status: "verified"
      guidance: "Avoid ellipses in text; use correct spacing when used."

  exclamation_points:
    rule_id: "exclamation_points"
    display_name: "Exclamation Points"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Exclamation points"
      pages: [128]
      verification_status: "verified"
      guidance: "Use sparingly; avoid in technical documentation except for positivity in onboarding."

  hyphens:
    rule_id: "hyphens"
    display_name: "Hyphens"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Hyphens"
      pages: [129]
      verification_status: "verified"
      guidance: "Use to connect related info; hyphenate compound adjectives before a noun."

  parentheses:
    rule_id: "parentheses"
    display_name: "Parentheses"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Parentheses"
      pages: [132]
      verification_status: "verified"
      guidance: "Use for abbreviations, symbols, and measurements; avoid for general text."

  periods:
    rule_id: "periods"
    display_name: "Periods"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Periods"
      pages: [133]
      verification_status: "verified"
      guidance: "One space after a period. Use for file extensions."

  quotation_marks:
    rule_id: "quotation_marks"
    display_name: "Quotation Marks"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Quotation marks"
      pages: [136]
      verification_status: "verified"
      guidance: "Use double quotes for direct quotes; place periods/commas inside closing quotes."

  semicolons:
    rule_id: "semicolons"
    display_name: "Semicolons"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Semicolons"
      pages: [139]
      verification_status: "verified"
      guidance: "Use to separate independent clauses or complex series items."

  slashes:
    rule_id: "slashes"
    display_name: "Slashes"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Slashes"
      pages: [139]
      verification_status: "verified"
      guidance: "Avoid 'and/or'. Use forward slash for path names in documentation generally."

  spacing:
    rule_id: "spacing"
    display_name: "Spacing"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Punctuation and symbols"
      pages: [117, 118, 133]
      verification_status: "verified"
      guidance: "Use one space after periods. Use appropriate spacing around punctuation marks."

  punctuation_and_symbols:
    rule_id: "punctuation_and_symbols"
    display_name: "Punctuation and Symbols"
    category: "punctuation"
    severity: "low"
    ibm_style:
      topic: "Punctuation and symbols"
      pages: [117, 118, 119, 120]
      verification_status: "verified"
      guidance: "General guidance on correct usage of punctuation marks and special symbols."

# ============================================================================
# NUMBERS AND MEASUREMENT
# ============================================================================
numbers_and_measurement:

  numbers_currency:
    rule_id: "numbers_currency"
    display_name: "Currency"
    category: "numbers_and_measurement"
    severity: "low"
    ibm_style:
      topic: "Currency"
      pages: [142]
      verification_status: "verified"
      guidance: "Use ISO codes (USD, EUR) for international audiences."

  dates_and_times:
    rule_id: "dates_and_times"
    display_name: "Dates and Times"
    category: "numbers_and_measurement"
    severity: "medium"
    ibm_style:
      topic: "Dates and times"
      pages: [144, 145, 146, 147]
      verification_status: "verified"
      guidance: "Use format '14 July 2020'. Avoid all-numeric dates (9/12/2023)."

  numbers_general:
    rule_id: "numbers_general"
    display_name: "Numbers"
    category: "numbers_and_measurement"
    severity: "low"
    ibm_style:
      topic: "Numbers"
      pages: [150, 151, 152, 153]
      verification_status: "verified"
      guidance: "Use commas for thousands; align decimals in columns."

  numerals_vs_words:
    rule_id: "numerals_vs_words"
    display_name: "Numerals vs Words"
    category: "numbers_and_measurement"
    severity: "low"
    ibm_style:
      topic: "Numerals versus words"
      pages: [157]
      verification_status: "verified"
      guidance: "Generally use numerals for all numbers. Words acceptable for < 10."

  mathematical_equations:
    rule_id: "mathematical_equations"
    display_name: "Mathematical Equations"
    category: "numbers_and_measurement"
    severity: "low"
    ibm_style:
      topic: "Mathematical equations"
      pages: [158]
      verification_status: "verified"
      guidance: "Keep simple; avoid using x for multiplication sign."

  phone_numbers:
    rule_id: "phone_numbers"
    display_name: "Phone Numbers"
    category: "numbers_and_measurement"
    severity: "low"
    ibm_style:
      topic: "Phone numbers"
      pages: [159]
      verification_status: "verified"
      guidance: "Use hyphens for US numbers; use international format for global audiences."

  units_of_measurement:
    rule_id: "units_of_measurement"
    display_name: "Units of Measurement"
    category: "numbers_and_measurement"
    severity: "low"
    ibm_style:
      topic: "Units of measurement"
      pages: [161, 162, 163, 164]
      verification_status: "verified"
      guidance: "Use SI units followed by US customary in parentheses. Use a space before unit."

# ============================================================================
# STRUCTURE AND FORMAT
# ============================================================================
structure_and_format:

  books:
    rule_id: "books"
    display_name: "Books"
    category: "structure_and_format"
    severity: "low"
    ibm_style:
      topic: "Books"
      pages: [168, 169]
      verification_status: "verified"
      guidance: "Follow standard sequence (Front matter, Body, Back matter)."

  examples:
    rule_id: "examples"
    display_name: "Examples"
    category: "structure_and_format"
    severity: "low"
    ibm_style:
      topic: "Examples"
      pages: [175]
      verification_status: "verified"
      guidance: "Introduce examples with complete sentences or 'For example'."

  figures:
    rule_id: "figures"
    display_name: "Figures"
    category: "structure_and_format"
    severity: "medium"
    ibm_style:
      topic: "Figures"
      pages: [176, 177, 178]
      verification_status: "verified"
      guidance: "Place captions below figures. Use sentence-style capitalization."

  glossaries:
    rule_id: "glossaries"
    display_name: "Glossaries"
    category: "structure_and_format"
    severity: "low"
    ibm_style:
      topic: "Glossaries"
      pages: [181]
      verification_status: "verified"
      guidance: "Define new or product-specific terms. Alphabetize letter-by-letter."

  headings:
    rule_id: "headings"
    display_name: "Headings"
    category: "structure_and_format"
    severity: "medium"
    ibm_style:
      topic: "Headings"
      pages: [181, 182, 183]
      verification_status: "verified"
      guidance: "Use sentence-style capitalization. Make headings descriptive and task-oriented."

  highlighting:
    rule_id: "highlighting"
    display_name: "Highlighting"
    category: "structure_and_format"
    severity: "medium"
    ibm_style:
      topic: "Highlighting"
      pages: [184, 185, 186, 187, 188, 189, 190, 191]
      verification_status: "verified"
      guidance: "Use bold for UI elements; monospace for code/input; italic for emphasis/titles."

  lists:
    rule_id: "lists"
    display_name: "Lists"
    category: "structure_and_format"
    severity: "medium"
    ibm_style:
      topic: "Lists"
      pages: [193, 194, 195, 196, 197]
      verification_status: "verified"
      guidance: "Use parallel grammatical structure. Introduce with a complete sentence."

  messages:
    rule_id: "messages"
    display_name: "Messages"
    category: "structure_and_format"
    severity: "medium"
    ibm_style:
      topic: "Messages"
      pages: [200, 201, 202, 203]
      verification_status: "verified"
      guidance: "Focus on the problem and solution; avoid blaming the user."

  notes:
    rule_id: "notes"
    display_name: "Notes"
    category: "structure_and_format"
    severity: "medium"
    ibm_style:
      topic: "Notes"
      pages: [204]
      verification_status: "verified"
      guidance: "Use meaningfully labeled notes (Tip, Important) sparingly. Use Danger/Caution for hazards."

  paragraphs:
    rule_id: "paragraphs"
    display_name: "Paragraphs"
    category: "structure_and_format"
    severity: "low"
    ibm_style:
      topic: "Paragraphs"
      pages: [206]
      verification_status: "verified"
      guidance: "Keep paragraphs short and focused on a single idea."

  procedures:
    rule_id: "procedures"
    display_name: "Procedures"
    category: "structure_and_format"
    severity: "high"
    ibm_style:
