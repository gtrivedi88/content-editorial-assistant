{% extends "base.html" %}
{% block title %}Error — CEA{% endblock %}

{% block content %}
<section class="pf-v5-c-page__main-section">
  <div style="max-width:600px; margin:60px auto; text-align:center;">
    <div class="pf-v5-c-empty-state">
      <div class="pf-v5-c-empty-state__content">
        <i class="fas fa-exclamation-triangle pf-v5-c-empty-state__icon" style="color:var(--pf-v5-global--danger-color--100); font-size:3rem;"></i>
        <h1 class="pf-v5-c-title pf-m-lg">Something went wrong</h1>
        <div class="pf-v5-c-empty-state__body">
          <p>{{ error_message or 'An unexpected error occurred.' }}</p>
        </div>
        <a href="{{ url_for('index') }}" class="pf-v5-c-button pf-m-primary">
          <i class="fas fa-home pf-v5-u-mr-sm"></i> Back to Home
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
