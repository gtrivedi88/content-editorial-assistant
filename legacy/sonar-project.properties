# SonarQube Configuration for Content Editorial Assistant
# Corporate SAST Solution: https://sonarqube.corp.redhat.com
#
# Documentation: https://source.redhat.com/groups/public/it-application-lifecycle-management/wiki/sonarqubecorpredhatcom_sast_solution

# Project identification
sonar.projectKey=ccs-ai_content-editorial-assistant_ed819014-2450-4f3a-baea-571408e42aaa
sonar.projectName=Content Editorial Assistant
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Python-specific configuration
sonar.python.version=3.12
sonar.language=py

# Exclusions (non-source files and non-critical directories)
sonar.exclusions=\
  **/venv/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/docs/**,\
  **/.cache/**,\
  **/tests/**,\
  **/*.pyc,\
  **/migrations/**,\
  **/static/**,\
  **/templates/**,\
  **/scripts/**,\
  **/testing_agent/**,\
  **/qa_pipeline/**,\
  **/pdf_reports/**,\
  **/.light/**

# Test file patterns
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Security hotspots and vulnerability detection
sonar.python.bandit.reportPaths=security_reports/bandit_report.json

# Quality gate - don't block CI, check status in SonarQube dashboard
sonar.qualitygate.wait=false

