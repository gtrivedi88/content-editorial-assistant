# Prefixes Rule Configuration
# IBM Style Guide (Page 108): Close prefixes without hyphens unless exceptions apply.
#
# HOW TO MAINTAIN:
# - Add established technical terms that should KEEP their hyphen below
# - No code changes needed — just edit this file and restart.

# Standard technical terms that correctly keep their hyphen.
# These are industry-established compounds where removing the hyphen
# would be incorrect or change meaning.
