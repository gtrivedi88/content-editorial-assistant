# Anthropomorphism Rule Configuration
# IBM Style Guide (Page 90): Do not attribute human characteristics to non-human things.
#
# HOW TO MAINTAIN:
# - Add new anthropomorphic verbs to 'anthropomorphic_verbs' when discovered
# - Add new safe technical verbs to 'safe_technical_verbs' to prevent false positives
# - Add new software/system terms to 'non_human_indicators'
# No code changes required — just edit this file and restart.

# Verbs that attribute human qualities to software/systems
# If a non-human subject uses one of these verbs, it's flagged
anthropomorphic_verbs:
  - want
  - think
  - know
  - decide
  - believe
  - understand
  - try
  - refuse
  - like
  - feel
  - see
  - remember
  - forget
  - assume
  - consider
  - hope
  - wish
  - prefer
  - learn
  - realize
  - recognize
  - notice
  - care
  - worry
  - fear
  - expect
  - need
  - desire
  - insist
  - demand
  - agree
  - disagree
  - argue
  - claim
  - suggest
  - recommend

