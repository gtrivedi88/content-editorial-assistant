# Citations and References Configuration
# IBM Style Guide (p. 217-223)

# Problematic link text phrases - always flag these
problematic_link_phrases:
  - "click here"
  - "see here"
  - "go here"
  - "this link"
  - "here"

# Cross-reference terms that should be lowercase per IBM Style (p. 219)
# "Use lowercase on the words appendix, bibliography, chapter, contents,
#  figure, glossary, note, part, preface, table, and volume when these
#  words are used in a cross-reference or when referred to generically."
cross_reference_terms:
  - "appendix"
  - "bibliography"
  - "chapter"
  - "contents"
  - "figure"
  - "glossary"
  - "note"
  - "part"
  - "preface"
  - "table"
  - "volume"

# Cross-reference abbreviations that should not be used (p. 219)
# "Do not abbreviate chapter, part, or volume in cross-references."
cross_reference_abbreviations:
  "ch.": "chapter"
  "chap.": "chapter"
  "ch": "chapter"
  "vol.": "volume"
  "vol": "volume"
  "pt.": "part"
  "sec.": "section"
  "fig.": "figure"
  "tbl.": "table"
  "app.": "appendix"
